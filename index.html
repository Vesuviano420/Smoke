<script>
    document.addEventListener("DOMContentLoaded", function() {
        const videos = document.querySelectorAll('.card-video');
        
        function forcePlayAll() {
            videos.forEach(video => {
                // Safari richiede esplicitamente che il video sia mutato via JS prima del play
                video.muted = true;
                video.setAttribute('muted', '');
                
                let playPromise = video.play();
                if (playPromise !== undefined) {
                    playPromise.catch(err => {
                        console.log("Safari richiede un'interazione utente esplicita...");
                    });
                }
            });
        }

        // Tenta l'avvio immediato al caricamento
        forcePlayAll();

        // Sblocca Safari non appena l'utente fa un tocco, uno scroll o muove lo schermo
        ['touchstart', 'touchend', 'scroll', 'click'].forEach(eventType => {
            window.addEventListener(eventType, forcePlayAll, { passive: true, once: false });
        });
    });
</script>
